name: Bot Automation # هذا مجرد عنوان للمهمة في قيتهاب

on:
  schedule:
    # يعمل عند الدقيقة 0 من كل 6 ساعات
    - cron: '0 */6 * * *'
  workflow_dispatch: # زر للتشغيل اليدوي

permissions:
  contents: write # صلاحية ضرورية لرفع ملف sh.json

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Trading Bot
        # هنا يتم تشغيل ملفك الذي اسمه bot.py
        run: python bot.py
