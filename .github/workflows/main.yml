name: Run Bybit Demo Trading Bot

on:
  schedule:
    # يعمل كل 6 ساعات (يمكن تعديله حسب الحاجة)
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # للتشغيل اليدوي من GitHub

jobs:
  trade:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Configure Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

    - name: Run trading bot
      env:
        BYBIT_API_KEY: ${{ secrets.BYBIT_API_KEY }}
        BYBIT_API_SECRET: ${{ secrets.BYBIT_API_SECRET }}
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python bybit_demo_bot.py

    - name: Commit and push history
      run: |
        if [ -f sh.json ]; then
          git add sh.json
          if ! git diff --cached --quiet; then
            git commit -m "تحديث عمليات التداول - $(date -u +%Y-%m-%d_%H:%M:%S)"
            git push
          else
            echo "لا توجد تغييرات للرفع"
          fi
        fi
